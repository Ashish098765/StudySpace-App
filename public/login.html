<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | StudySpace</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .auth-container {
            background: #1e1e1e;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .auth-container h2 {
            margin-top: 0;
            margin-bottom: 25px;
            color: #4CAF50;
        }

        .google-btn {
            background-color: #ffffff;
            color: #333333;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.3s;
            margin-bottom: 10px;
        }

        .google-btn:hover { background-color: #f1f1f1; }
        .google-btn img { width: 20px; height: 20px; }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: #888;
            font-size: 14px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #444;
        }
        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #aaaaaa;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #333;
            background: #2a2a2a;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }

        .input-group input:focus { outline: none; border-color: #4CAF50; }

        .auth-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .auth-btn:hover { background-color: #45a049; }

        .toggle-link {
            margin-top: 20px;
            display: block;
            color: #00bcd4;
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
        }

        .toggle-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <a href="/" style="position: absolute; top: 20px; left: 20px; background: #2c2c2c; color: white; text-decoration: none; padding: 10px 15px; border-radius: 6px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: background 0.3s;" onmouseover="this.style.background='#444'" onmouseout="this.style.background='#2c2c2c'">
        ⬅ Back to Home
    </a>

    <div class="auth-container" id="login-box">
        <h2 id="form-title">Welcome Back</h2>
        
        <button type="button" class="google-btn" id="google-login-btn">
            <svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="20px" height="20px" style="display: block;">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
                <path fill="none" d="M0 0h48v48H0z"></path>
            </svg>
            Sign in with Google
        </button>

        <div class="divider">OR</div>
        
        <form id="auth-form">
            <div class="input-group" id="name-group" style="display: none;">
                <label for="username">Display Name</label>
                <input type="text" id="username" placeholder="How should we call you?">
            </div>

            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="auth-btn" id="submit-btn">Login</button>
        </form>

        <a class="toggle-link" id="toggle-text">Don't have an account? Sign up here.</a>
    </div>

    <script type="module">
        // Import standard web Firebase SDKs
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-analytics.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // Your exact Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAN5R8PaIBuC9BxP52IW_EwkurHBOkYxxU",
            authDomain: "studyspace-45780.firebaseapp.com",
            projectId: "studyspace-45780",
            storageBucket: "studyspace-45780.firebasestorage.app",
            messagingSenderId: "212493442342",
            appId: "1:212493442342:web:15b83a52a04bbf8567b5e7",
            measurementId: "G-NVHDFF8JDN"
        };

        // Initialize Firebase apps
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        // ==========================================
        // UI TOGGLE LOGIC (Login vs Sign Up)
        // ==========================================
        let isLoginMode = true;
        document.getElementById('toggle-text').addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            if (isLoginMode) {
                document.getElementById('form-title').innerText = "Welcome Back";
                document.getElementById('submit-btn').innerText = "Login";
                document.getElementById('toggle-text').innerText = "Don't have an account? Sign up here.";
                document.getElementById('name-group').style.display = "none";
                document.getElementById('username').removeAttribute('required');
            } else {
                document.getElementById('form-title').innerText = "Create an Account";
                document.getElementById('submit-btn').innerText = "Sign Up";
                document.getElementById('toggle-text').innerText = "Already have an account? Login here.";
                document.getElementById('name-group').style.display = "block";
                document.getElementById('username').setAttribute('required', 'true');
            }
        });

        // ==========================================
        // GOOGLE LOGIN BUTTON LOGIC
        // ==========================================
        document.getElementById('google-login-btn').addEventListener('click', () => {
            signInWithPopup(auth, googleProvider)
                .then((result) => {
                    alert("Welcome " + result.user.displayName + "!");
                    window.location.href = "/"; // Send them back to the home page
                }).catch((error) => {
                    console.error(error);
                    alert("Google Sign In Error: " + error.message);
                });
        });

        // ==========================================
        // EMAIL & PASSWORD LOGIN/SIGNUP LOGIC
        // ==========================================
        document.getElementById('auth-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (isLoginMode) {
                // Handle Login
                signInWithEmailAndPassword(auth, email, password)
                    .then(() => {
                        alert("Logged in successfully!");
                        window.location.href = "/"; 
                    })
                    .catch((error) => {
                        console.error(error);
                        alert("Login Failed: " + error.message);
                    });
            } else {
                // Handle Sign Up
                createUserWithEmailAndPassword(auth, email, password)
                    .then(() => {
                        alert("Account created successfully!");
                        window.location.href = "/"; 
                    })
                    .catch((error) => {
                        console.error(error);
                        alert("Sign Up Failed: " + error.message);
                    });
            }
        });
    </script>
</body>
</html>
