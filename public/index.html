<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudySpace | Collaborative 3D Learning</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Import Map for Native 3D Addons -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <style>
        :root {
            --bg-color: #09090b; 
            --surface: rgba(24, 24, 27, 0.6);
            --surface-hover: rgba(39, 39, 42, 0.8);
            --border-subtle: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.15);
            --text-main: #f8fafc;
            --text-muted: #a1a1aa;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --accent: #10b981;
            --danger: #ef4444;
            --gold: #fbbf24;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body, html {
            background-color: var(--bg-color);
            color: var(--text-main);
            width: 100vw;
            height: 100vh;
            overflow: hidden; 
        }
        
        #webgl-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #auth-nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 5%; 
            background: rgba(9, 9, 11, 0.85);
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-subtle);
            position: absolute;
            top: 0; left: 0; right: 0;
            z-index: 1000;
        }
        
        .logo-text { 
            font-size: 1.4rem; font-weight: 800; letter-spacing: -0.03em; 
            color: var(--text-main); text-decoration: none; 
            display: flex; align-items: center; gap: 8px;
        }
        
        button { cursor: pointer; border: none; border-radius: 8px; font-weight: 500; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .btn-login { background-color: var(--text-main); color: var(--bg-color); padding: 0.5rem 1.2rem; font-size: 0.9rem; border-radius: 99px; font-weight: 600;}
        .btn-login:hover { transform: scale(1.02); box-shadow: 0 4px 14px rgba(255, 255, 255, 0.1); }
        
        #user-profile-container { display: flex; align-items: center; gap: 1rem; background: var(--surface); padding: 0.4rem 0.4rem 0.4rem 1rem; border-radius: 99px; border: 1px solid var(--border-subtle); backdrop-filter: blur(10px); }
        .profile-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.1); }
        .profile-text { display: flex; flex-direction: column; line-height: 1.2; }
        #profile-name { font-size: 0.85rem; font-weight: 600; }
        #profile-email { font-size: 0.75rem; color: var(--text-muted); }
        
        .btn-logout { background-color: rgba(239, 68, 68, 0.1); color: var(--danger); padding: 0.4rem 1rem; border-radius: 99px; font-size: 0.8rem; font-weight: 600;}
        .btn-logout:hover { background-color: var(--danger); color: white; }

        /* --- 3D Perspectived Spatial Board (Back Right) --- */
        #spatial-board {
            position: absolute;
            top: 120px;
            right: 40px;
            width: 360px;
            max-height: calc(100vh - 160px);
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 1.5rem;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            pointer-events: auto;
            overflow-y: auto;
            
            /* CSS 3D Transformation to angle it into the background */
            transform: perspective(1200px) rotateY(-15deg);
            transform-origin: right center;
            box-shadow: -20px 20px 50px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.05);
            transition: transform 0.4s ease;
        }

        #spatial-board:hover {
            transform: perspective(1200px) rotateY(-8deg); /* Flattens slightly when reading */
            background: rgba(24, 24, 27, 0.8);
        }

        .board-title { font-size: 1.1rem; font-weight: 700; display: flex; align-items: center; gap: 0.6rem; color: var(--text-main); border-bottom: 1px solid var(--border-subtle); padding-bottom: 0.6rem; }
        
        .list-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0.8rem; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255,255,255,0.03);
            border-radius: 12px; margin-bottom: 0.5rem; transition: all 0.2s ease; 
        }
        .list-item:hover { border-color: var(--border-hover); background: rgba(255,255,255,0.02); }
        .list-item h4 { font-size: 0.9rem; font-weight: 600; }

        #spatial-hud {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(9, 9, 11, 0.85);
            border: 1px solid var(--border-subtle);
            color: var(--text-main);
            padding: 0.8rem 1.8rem;
            border-radius: 99px;
            backdrop-filter: blur(12px);
            z-index: 100;
            font-size: 0.9rem;
            pointer-events: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            transition: opacity 0.2s;
            font-weight: 500;
        }

        #action-dropdown-box {
            position: absolute;
            bottom: 2rem;
            left: 4rem;
            z-index: 10;
        }

        .btn-start-session { 
            background: linear-gradient(180deg, #ffffff 0%, #e4e4e7 100%);
            color: var(--bg-color); padding: 1rem 1.8rem; font-size: 1rem; 
            display: inline-flex; align-items: center; gap: 0.8rem; 
            border-radius: 99px; font-weight: 600;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        .btn-start-session:hover { transform: translateY(-2px); }

        .dropdown-menu { 
            position: absolute; bottom: calc(100% + 12px); left: 0;
            background: rgba(24, 24, 27, 0.9); backdrop-filter: blur(16px);
            border: 1px solid var(--border-subtle); border-radius: 16px; padding: 0.5rem; 
            display: flex; flex-direction: column; gap: 0.2rem; min-width: 220px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); 
            opacity: 0; visibility: hidden; transition: all 0.2s; z-index: 50; 
        }
        .session-dropdown-wrapper:hover .dropdown-menu { opacity: 1; visibility: visible; }
        .dropdown-item { 
            background: transparent; color: var(--text-muted); padding: 0.8rem 1rem; 
            border-radius: 10px; text-align: left; font-size: 0.9rem; font-weight: 500; 
            display: flex; align-items: center; gap: 0.8rem; transition: all 0.2s; width: 100%;
        }
        .dropdown-item i { font-size: 1.1rem; color: var(--text-main); }
        .dropdown-item:hover { background: var(--surface-hover); color: var(--text-main); }

        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 2000; opacity: 0; visibility: hidden; transition: all 0.3s ease; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content { background: #18181b; border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 2.5rem; width: 90%; max-width: 420px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7); transform: scale(0.95) translateY(20px); transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .modal-overlay.active .modal-content { transform: scale(1) translateY(0); }
        
        .modal-icon { width: 60px; height: 60px; background: rgba(99, 102, 241, 0.1); color: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin: 0 auto 1.5rem auto; }
        .modal-content h3 { margin-bottom: 0.5rem; font-size: 1.3rem; font-weight: 600; }
        .modal-content p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
        
        .modal-input { width: 100%; background: #09090b; border: 1px solid var(--border-subtle); color: var(--text-main); padding: 1rem; border-radius: 12px; font-size: 1rem; margin-bottom: 1.5rem; outline: none; transition: border 0.2s; text-align: center; font-family: monospace; letter-spacing: 2px;}
        .modal-input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(99,102,241,0.2); }
        
        .modal-actions { display: flex; gap: 1rem; }
        .btn-cancel { flex: 1; background: transparent; border: 1px solid rgba(255,255,255,0.2); color: var(--text-main); padding: 0.8rem; border-radius: 12px; }
        .btn-cancel:hover { background: rgba(255,255,255,0.05); }
        .btn-confirm { flex: 1; background: var(--primary); color: white; padding: 0.8rem; border: none; border-radius: 12px; }
        .btn-confirm:hover { background: var(--primary-hover); }

        #leaderboard-list .list-item { border: 1px solid rgba(255,255,255,0.03) !important; background: rgba(0,0,0,0.3) !important; margin-bottom: 0.8rem !important; border-radius: 12px !important; padding: 1rem !important;}
        #leaderboard-list .list-item:hover { border-color: var(--border-hover) !important; background: rgba(255,255,255,0.02) !important; }
    </style>
</head>
<body>

    <div id="webgl-container"></div>

    <nav id="auth-nav">
        <a href="/" class="logo-text">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="url(#paint0_linear)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <defs>
                    <linearGradient id="paint0_linear" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse">
                        <stop stop-color="#818cf8"/>
                        <stop offset="1" stop-color="#34d399"/>
                    </linearGradient>
                </defs>
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
            </svg>
            StudySpace
        </a>
        <div class="nav-actions">
            <button id="nav-login-btn" class="btn-login" onclick="window.location.href='/login.html'">Log In</button>
            
            <div id="user-profile-container" style="display: none;">
                <img id="user-avatar" class="profile-avatar" src="" alt="Avatar">
                <div class="profile-text">
                    <div id="profile-name">Name</div>
                    <div id="profile-email">email@example.com</div>
                </div>
                <button id="logout-btn" class="btn-logout"><i class="fa-solid fa-arrow-right-from-bracket"></i></button>
            </div>
        </div>
    </nav>

    <div id="spatial-board">
        <div>
            <h2 class="board-title"><i class="fa-solid fa-trophy" style="color: var(--gold);"></i> Top Scholars</h2>
            <div id="leaderboard-list">
                <div style="text-align: center; padding: 1.5rem; color: var(--text-muted); font-size: 0.85rem;">
                    <i class="fa-solid fa-spinner fa-spin"></i> Synchronizing ranks...
                </div>
            </div>
        </div>
    </div>

    <div id="action-dropdown-box">
        <div class="session-dropdown-wrapper">
            <button class="btn-start-session" onclick="const menu = this.nextElementSibling; const isVis = menu.style.visibility === 'visible'; menu.style.visibility = isVis ? 'hidden' : 'visible'; menu.style.opacity = isVis ? '0' : '1';">
                Start a Live Session
                <i class="fa-solid fa-chevron-up" style="font-size: 0.8rem; margin-left: 0.4rem;"></i>
            </button>
            <div class="dropdown-menu">
                <button class="dropdown-item" onclick="createPrivateRoom()"><i class="fa-solid fa-plus"></i> Create new room</button>
                <button class="dropdown-item" onclick="joinPrivateRoom()"><i class="fa-solid fa-arrow-right-to-bracket"></i> Join private room</button>
                <div style="height: 1px; background: rgba(255,255,255,0.1); margin: 4px 0;"></div>
                <button class="dropdown-item" onclick="window.location.href='/room.html?id=public-general'"><i class="fa-solid fa-globe"></i> Join public lobby</button>
            </div>
        </div>
    </div>

    <div id="spatial-hud">
        <i class="fa-solid fa-hand-pointer" style="color: var(--primary); margin-right: 6px;"></i> 
        Drag to look around. Hover over doors/objects to explore StudySpace.
    </div>

    <div id="join-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-icon"><i class="fa-solid fa-door-open"></i></div>
            <h3>Join a Room</h3>
            <p>Enter the 6-digit code or paste the invite link to join your peers.</p>
            <input type="text" id="join-room-input" class="modal-input" placeholder="e.g. 123456" autocomplete="off">
            <div id="join-error" style="color: var(--danger); font-size: 0.85rem; margin-top: -1rem; margin-bottom: 1rem; display: none; font-weight: 500;">
                Room not found. Ensure the host is present!
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeJoinModal()">Cancel</button>
                <button class="btn-confirm" id="btn-join-submit" onclick="submitJoinRoom()">Join Room</button>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- FIREBASE CONFIGURATION ---
        const LAMBDA_URL = "https://nvq32ao6fel7xdvfcjhzatg5ja0reeqs.lambda-url.us-east-1.on.aws/";

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyB57PcjYtWktsOGKFLQmWX-Nc6HtYeZxp8",
            authDomain: "studyspace-f6e22.firebaseapp.com",
            projectId: "studyspace-f6e22",
            storageBucket: "studyspace-f6e22.firebasestorage.app",
            messagingSenderId: "498741408880",
            appId: "1:498741408880:web:bd5fdea00d10e9329130b5",
            measurementId: "G-J1X8Y7KDQV"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        window.auth = auth;

        // UI Binding Logic
        const loginBtn = document.getElementById('nav-login-btn');
        const profileContainer = document.getElementById('user-profile-container');
        const profileName = document.getElementById('profile-name');
        const profileEmail = document.getElementById('profile-email'); 
        const profileAvatar = document.getElementById('user-avatar');
        const logoutBtn = document.getElementById('logout-btn');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                if(loginBtn) loginBtn.style.display = 'none';
                if(profileContainer) profileContainer.style.display = 'flex';
                if(profileName) profileName.textContent = user.displayName || 'Student';
                if(profileEmail) profileEmail.textContent = user.email || 'No Email'; 
                if(profileAvatar && user.photoURL) profileAvatar.src = user.photoURL;
            } else {
                if(loginBtn) loginBtn.style.display = 'block';
                if(profileContainer) profileContainer.style.display = 'none';
            }
        });

        if(logoutBtn) {
            logoutBtn.addEventListener('click', () => {
                signOut(auth).then(() => window.location.reload());
            });
        }

        // Leaderboard Fetching
        function forceNumber(val) {
            const num = parseInt(val);
            if (isNaN(num)) return 0;
            return num;
        }

        async function loadLeaderboard() {
            const container = document.getElementById('leaderboard-list');
            if (!container) return; 

            try {
                const response = await fetch(LAMBDA_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'getLeaderboard' })
                });

                if (!response.ok) throw new Error("Lambda response was not ok");
                const topUsers = await response.json();
                
                container.innerHTML = ""; 
                let rank = 1; 
                
                topUsers.forEach((user) => {
                    const cleanXP = forceNumber(user.xp);
                    const safeName = user.name || "Student";
                    
                    let rankColor = "var(--text-muted)";
                    if(rank === 1) rankColor = "#fbbf24"; 
                    if(rank === 2) rankColor = "#94a3b8"; 
                    if(rank === 3) rankColor = "#b45309"; 

                    container.innerHTML += `
                        <div class="list-item">
                            <span><strong style="color: ${rankColor}; margin-right: 12px; font-size: 1.1rem;">#${rank}</strong> ${safeName}</span>
                            <span style="background: rgba(16, 185, 129, 0.1); color: var(--accent); padding: 4px 10px; border-radius: 99px; font-size: 0.8rem; font-weight: 600;">${cleanXP} XP</span>
                        </div>
                    `;
                    rank++; 
                });

                setTimeout(async () => {
                    if (window.auth && window.auth.currentUser) {
                        const uid = window.auth.currentUser.uid;
                        let myXP = 0;
                        let myName = window.auth.currentUser.displayName || 'Student';

                        try {
                            const token = await window.auth.currentUser.getIdToken();
                            const userRes = await fetch(LAMBDA_URL, {
                                method: 'POST',
                                headers: { 
                                    'Content-Type': 'application/json',
                                    'Authorization': `Bearer ${token}`
                                },
                                body: JSON.stringify({ action: 'getUserData', uid: uid })
                            });

                            if (userRes.ok) {
                                const userData = await userRes.json();
                                if (userData) {
                                    myXP = forceNumber(userData.xp);
                                    myName = userData.name || myName;
                                }
                            }

                            container.innerHTML += `
                                <div style="display: flex; align-items: center; text-align: center; margin: 1rem 0 0.6rem 0; color: var(--text-muted); font-size: 0.72rem; letter-spacing: 1px;">
                                    <div style="flex: 1; border-bottom: 1px solid var(--border-subtle);"></div>
                                    <span style="padding: 0 10px; font-weight: 600;">YOUR RANK</span>
                                    <div style="flex: 1; border-bottom: 1px solid var(--border-subtle);"></div>
                                </div>
                                <div class="list-item" style="background: rgba(99, 102, 241, 0.1) !important; border: 1px solid rgba(99, 102, 241, 0.3) !important; margin-bottom:0;">
                                    <span style="color: var(--text-main); font-weight: 500;"><i class="fa-solid fa-user" style="color: #818cf8; margin-right: 12px;"></i>${myName}</span>
                                    <span style="background: var(--primary); color: white; padding: 4px 10px; border-radius: 99px; font-size: 0.8rem; font-weight: 600;">${myXP} XP</span>
                                </div>
                            `;
                        } catch (e) {
                            console.error("Failed to load user's personal rank data", e);
                        }
                    }
                }, 1000); 

            } catch (error) {
                console.error("Failed to fetch leaderboard", error);
                container.innerHTML = '<div style="text-align: center; padding: 1.5rem; color: var(--danger);">Failed to connect to backend ranking service.</div>';
            }
        }
        
        loadLeaderboard();

        // --- NEW UPDATED SPATIAL LAYOUT COORDINATES ---
        let scene, camera, renderer, controls;
        let interactiveMeshes = [];
        let aiAvatarGroup; 
        
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const hudElement = document.getElementById('spatial-hud');

        function initSpatialEngine() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x09090b); 
            scene.fog = new THREE.FogExp2(0x09090b, 0.02);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 7, 16); 

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            document.getElementById('webgl-container').appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 - 0.05; 
            controls.minDistance = 4;
            controls.maxDistance = 25;

            // Lights
            const lightAmbient = new THREE.AmbientLight(0xffffff, 0.2);
            scene.add(lightAmbient);

            const spotIndigo = new THREE.SpotLight(0x6366f1, 3, 40, Math.PI/4, 0.4, 1);
            spotIndigo.position.set(-6, 12, 8);
            scene.add(spotIndigo);

            const spotEmerald = new THREE.SpotLight(0x10b981, 2, 40, Math.PI/4, 0.4, 1);
            spotEmerald.position.set(6, 12, 0);
            scene.add(spotEmerald);

            // Floor
            const floorGeo = new THREE.PlaneGeometry(50, 40);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x121214, roughness: 0.8 });
            const floorGrid = new THREE.Mesh(floorGeo, floorMat);
            floorGrid.rotation.x = -Math.PI / 2;
            scene.add(floorGrid);

            buildSpatialAssets();

            window.addEventListener('resize', onResizeWindow);
            window.addEventListener('mousemove', onSpatialHover);
            window.addEventListener('click', onSpatialInteract);
        }

        function buildSpatialAssets() {
            // 1. FRONT & CENTER: The AI Avatar Placeholder (Glowing Core)
            aiAvatarGroup = new THREE.Group();
            
            const coreGeo = new THREE.OctahedronGeometry(1.4, 2);
            const coreMat = new THREE.MeshStandardMaterial({ color: 0x18181b, roughness: 0.1, metalness: 0.9 });
            const coreMesh = new THREE.Mesh(coreGeo, coreMat);
            
            const ringGeo = new THREE.TorusGeometry(1.9, 0.06, 16, 64);
            const ringMat = new THREE.MeshStandardMaterial({ color: 0x6366f1, emissive: 0x6366f1, emissiveIntensity: 2 });
            const ringMesh = new THREE.Mesh(ringGeo, ringMat);
            ringMesh.rotation.x = Math.PI / 2;

            aiAvatarGroup.add(coreMesh);
            aiAvatarGroup.add(ringMesh);
            
            // Positioning Avatar dead center, closer to user
            aiAvatarGroup.position.set(0, 4, 6);
            scene.add(aiAvatarGroup);

            // 2. BACK LEFT: Floating Interactive Action Buttons (Features)
            const features = [
                { name: 'Question Bank', url: '/practice.html', color: 0x6366f1, pos: new THREE.Vector3(-6, 6, 0), geo: new THREE.BoxGeometry(1.2, 1.2, 1.2) },
                { name: 'Live Collaboration', url: '/rooms', color: 0x34d399, pos: new THREE.Vector3(-8, 4, -2), geo: new THREE.TetrahedronGeometry(0.9, 0.5) },
                { name: 'Performance Analytics', url: '/analytics', color: 0xfbbf24, pos: new THREE.Vector3(-5, 3.5, 2), geo: new THREE.TorusGeometry(0.8, 0.25, 16, 32) }
            ];

            features.forEach(feat => {
                const featMat = new THREE.MeshStandardMaterial({ 
                    color: feat.color, 
                    emissive: feat.color, 
                    emissiveIntensity: 0.2, 
                    roughness: 0.2, 
                    metalness: 0.5 
                });
                const featMesh = new THREE.Mesh(feat.geo, featMat);
                featMesh.position.copy(feat.pos);
                featMesh.userData = { type: 'feature', name: feat.name, url: feat.url };
                
                scene.add(featMesh);
                interactiveMeshes.push(featMesh);
            });

            // 3. DEEP BACK LEFT: Room Doors
            const roomConfig = [
                { name: 'General Lounge', route: 'public-general', color: 0xfbbf24, pos: new THREE.Vector3(-12, 2.5, -6), rot: Math.PI / 6 },
                { name: 'Pomodoro Focus', route: 'public-pomodoro', color: 0xef4444, pos: new THREE.Vector3(-9, 2.5, -10), rot: Math.PI / 8 },
                { name: 'Quiet Reading', route: 'public-quiet', color: 0x10b981, pos: new THREE.Vector3(-5, 2.5, -13), rot: 0 }
            ];

            roomConfig.forEach(room => {
                const doorBox = new THREE.BoxGeometry(2.5, 5, 0.2);
                const doorMat = new THREE.MeshStandardMaterial({
                    color: room.color,
                    emissive: room.color,
                    emissiveIntensity: 0.15,
                    roughness: 0.4
                });
                const doorMesh = new THREE.Mesh(doorBox, doorMat);
                doorMesh.position.copy(room.pos);
                doorMesh.rotation.y = room.rot;
                doorMesh.userData = { type: 'room', name: room.name, url: `/room.html?id=${room.route}` };
                
                scene.add(doorMesh);
                interactiveMeshes.push(doorMesh);
            });

            // 4. BACK RIGHT ANCHOR: A subtle glowing panel behind the HTML Leaderboard
            const boardAnchorGeo = new THREE.PlaneGeometry(14, 18);
            const boardAnchorMat = new THREE.MeshStandardMaterial({ 
                color: 0x09090b, 
                emissive: 0x6366f1, 
                emissiveIntensity: 0.05,
                transparent: true,
                opacity: 0.3
            });
            const boardAnchor = new THREE.Mesh(boardAnchorGeo, boardAnchorMat);
            boardAnchor.position.set(12, 6, -4);
            boardAnchor.rotation.y = -Math.PI / 8;
            scene.add(boardAnchor);
        }

        // Raycasting Logic
        function onSpatialHover(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersections = raycaster.intersectObjects(interactiveMeshes);

            if (intersections.length > 0) {
                const target = intersections[0].object;
                hudElement.innerHTML = `<i class="fa-solid fa-link" style="color: var(--primary); margin-right:6px;"></i> Click to access: <strong>${target.userData.name}</strong>`;
                document.body.style.cursor = 'pointer';
            } else {
                hudElement.innerHTML = `<i class="fa-solid fa-hand-pointer" style="color: var(--primary); margin-right: 6px;"></i> Drag to look around. Hover over items to explore.`;
                document.body.style.cursor = 'default';
            }
        }

        function onSpatialInteract(event) {
            if (event.clientY < 75 || (event.clientX > (window.innerWidth - 380) && event.clientY > 100)) return;

            raycaster.setFromCamera(mouse, camera);
            const intersections = raycaster.intersectObjects(interactiveMeshes);

            if (intersections.length > 0) {
                const target = intersections[0].object;
                if (target.userData.url) {
                    window.location.href = target.userData.url;
                }
            }
        }

        function onResizeWindow() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function renderFrameLoop() {
            requestAnimationFrame(renderFrameLoop);
            controls.update();

            const time = Date.now() * 0.001;

            // Animate Center Avatar
            if (aiAvatarGroup) {
                aiAvatarGroup.position.y = 4 + Math.sin(time * 1.5) * 0.2; // Gentle hover
                aiAvatarGroup.children[0].rotation.y = time * 0.4;         // Core spin
                aiAvatarGroup.children[1].rotation.z = time * 0.8;         // Ring spin
                aiAvatarGroup.children[1].rotation.x = Math.PI / 2 + Math.sin(time) * 0.15; // Ring wobble
            }

            // Animate Left-Side Floating Features
            interactiveMeshes.forEach((mesh, index) => {
                if (mesh.userData.type === 'feature') {
                    mesh.rotation.y += 0.01;
                    mesh.rotation.x += 0.005;
                    mesh.position.y += Math.sin(time * 2 + index) * 0.003; 
                }
            });

            renderer.render(scene, camera);
        }

        initSpatialEngine();
        renderFrameLoop();
    </script>

    <script>
    function checkLogin() {
        if (!window.auth || !window.auth.currentUser) {
            sessionStorage.setItem('returnUrl', window.location.href);
            window.location.href = '/login.html';
            return false;
        }
        return true;
    }

    function createPrivateRoom() {
        if (!checkLogin()) return; 
        const numericalCode = Math.floor(100000 + Math.random() * 900000).toString();
        window.location.href = `/room.html?id=${numericalCode}`;
    }

    function joinPrivateRoom() {
        if (!checkLogin()) return; 
        document.getElementById('join-modal').classList.add('active');
        const input = document.getElementById('join-room-input');
        if(input) {
            input.placeholder = "Enter 6-digit code (e.g. 123456)";
            input.focus();
        }
    }

    function closeJoinModal() {
        document.getElementById('join-modal').classList.remove('active');
    }

    function submitJoinRoom() {
        if (!checkLogin()) return; 
        const input = document.getElementById('join-room-input').value.trim();
        if (!input) return;

        let roomId = input;
        
        if (input.includes('id=')) {
            roomId = input.split('id=')[1].split('&')[0];
        } else if (input.includes('/room/')) {
            roomId = input.split('/room/').pop();
        }
        
        roomId = roomId.replace(/\//g, '');

        if (roomId) {
            window.location.href = `/room.html?id=${roomId}`;
        }
    }
    </script>
</body>
