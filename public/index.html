<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudySpace | Mountain Environment</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <style>
        :root {
            --bg-color: #020617; /* Deep mountain night */
            --surface: rgba(15, 23, 42, 0.95);
            --border-subtle: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #6366f1;
            --danger: #ef4444;
            --gold: #fbbf24;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body, html {
            background-color: var(--bg-color);
            color: var(--text-main);
            width: 100vw;
            height: 100vh;
            overflow: hidden; 
        }
        
        #webgl-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        #auth-nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 5%; 
            background: rgba(2, 6, 23, 0.9);
            border-bottom: 1px solid var(--border-subtle);
            position: absolute; top: 0; left: 0; right: 0; z-index: 1000;
        }
        
        .logo-text { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.03em; color: var(--text-main); text-decoration: none; display: flex; align-items: center; gap: 8px; }
        
        button { cursor: pointer; border: none; border-radius: 8px; font-weight: 500; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-login { background-color: var(--text-main); color: var(--bg-color); padding: 0.5rem 1.2rem; font-size: 0.9rem; border-radius: 99px; font-weight: 600;}
        .btn-login:hover { transform: scale(1.02); background: #e2e8f0; }
        
        #user-profile-container { display: flex; align-items: center; gap: 1rem; background: var(--surface); padding: 0.4rem 0.4rem 0.4rem 1rem; border-radius: 99px; border: 1px solid var(--border-subtle); }
        .profile-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.1); }
        .profile-text { display: flex; flex-direction: column; line-height: 1.2; }
        #profile-name { font-size: 0.85rem; font-weight: 600; }
        #profile-email { font-size: 0.75rem; color: var(--text-muted); }
        
        .btn-logout { background-color: rgba(239, 68, 68, 0.1); color: var(--danger); padding: 0.4rem 1rem; border-radius: 99px; font-size: 0.8rem; font-weight: 600;}
        .btn-logout:hover { background-color: var(--danger); color: white; }

        #spatial-hud {
            position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.9); border: 1px solid var(--border-subtle);
            color: var(--text-main); padding: 0.8rem 1.8rem; border-radius: 99px;
            z-index: 100; font-size: 0.9rem; pointer-events: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); font-weight: 500;
        }

        #action-dropdown-box { position: absolute; bottom: 2rem; left: 4rem; z-index: 10; }

        .btn-start-session { 
            background: #ffffff; color: #000000; padding: 1rem 1.8rem; font-size: 1rem; 
            display: inline-flex; align-items: center; gap: 0.8rem; 
            border-radius: 99px; font-weight: 600; box-shadow: 0 8px 20px rgba(0,0,0,0.6);
        }
        .btn-start-session:hover { background: #e2e8f0; transform: translateY(-2px); }

        .dropdown-menu { 
            position: absolute; bottom: calc(100% + 12px); left: 0;
            background: #0f172a; border: 1px solid var(--border-subtle); border-radius: 16px; padding: 0.5rem; 
            display: flex; flex-direction: column; gap: 0.2rem; min-width: 220px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.8); opacity: 0; visibility: hidden; transition: all 0.2s; z-index: 50; 
        }
        .session-dropdown-wrapper:hover .dropdown-menu { opacity: 1; visibility: visible; }
        .dropdown-item { background: transparent; color: var(--text-muted); padding: 0.8rem 1rem; border-radius: 10px; text-align: left; font-size: 0.9rem; font-weight: 500; display: flex; align-items: center; gap: 0.8rem; width: 100%; transition: 0.2s; }
        .dropdown-item i { font-size: 1.1rem; color: var(--text-main); }
        .dropdown-item:hover { background: #1e293b; color: var(--text-main); }

        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.85); display: flex; align-items: center; justify-content: center; z-index: 2000; opacity: 0; visibility: hidden; transition: all 0.3s ease; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content { background: #0f172a; border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 2.5rem; width: 90%; max-width: 420px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.9); transform: scale(0.95) translateY(20px); transition: all 0.3s ease; }
        .modal-overlay.active .modal-content { transform: scale(1) translateY(0); }
        .modal-icon { width: 60px; height: 60px; background: rgba(99, 102, 241, 0.1); color: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin: 0 auto 1.5rem auto; }
        .modal-content h3 { margin-bottom: 0.5rem; font-size: 1.3rem; font-weight: 600; }
        .modal-content p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
        .modal-input { width: 100%; background: #020617; border: 1px solid var(--border-subtle); color: var(--text-main); padding: 1rem; border-radius: 12px; font-size: 1rem; margin-bottom: 1.5rem; outline: none; text-align: center; font-family: monospace; letter-spacing: 2px;}
        .modal-input:focus { border-color: var(--primary); }
        .modal-actions { display: flex; gap: 1rem; }
        .btn-cancel { flex: 1; background: transparent; border: 1px solid rgba(255,255,255,0.2); color: var(--text-main); padding: 0.8rem; border-radius: 12px; }
        .btn-cancel:hover { background: rgba(255,255,255,0.05); }
        .btn-confirm { flex: 1; background: var(--primary); color: white; padding: 0.8rem; border: none; border-radius: 12px; }
        .btn-confirm:hover { background: var(--primary); filter: brightness(1.1); }
    </style>
</head>
<body>

    <div id="webgl-container"></div>

    <nav id="auth-nav">
        <a href="/" class="logo-text">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="url(#paint0_linear)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <defs>
                    <linearGradient id="paint0_linear" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse">
                        <stop stop-color="#818cf8"/><stop offset="1" stop-color="#34d399"/>
                    </linearGradient>
                </defs>
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
            </svg>
            StudySpace
        </a>
        <div class="nav-actions">
            <button id="nav-login-btn" class="btn-login" onclick="window.location.href='/login.html'">Log In</button>
            <div id="user-profile-container" style="display: none;">
                <img id="user-avatar" class="profile-avatar" src="" alt="Avatar">
                <div class="profile-text">
                    <div id="profile-name">Name</div>
                    <div id="profile-email">email@example.com</div>
                </div>
                <button id="logout-btn" class="btn-logout"><i class="fa-solid fa-arrow-right-from-bracket"></i></button>
            </div>
        </div>
    </nav>

    <div id="action-dropdown-box">
        <div class="session-dropdown-wrapper">
            <button class="btn-start-session" onclick="const menu = this.nextElementSibling; const isVis = menu.style.visibility === 'visible'; menu.style.visibility = isVis ? 'hidden' : 'visible'; menu.style.opacity = isVis ? '0' : '1';">
                Start a Live Session
                <i class="fa-solid fa-chevron-up" style="font-size: 0.8rem; margin-left: 0.4rem;"></i>
            </button>
            <div class="dropdown-menu">
                <button class="dropdown-item" onclick="createPrivateRoom()"><i class="fa-solid fa-plus"></i> Create new room</button>
                <button class="dropdown-item" onclick="joinPrivateRoom()"><i class="fa-solid fa-arrow-right-to-bracket"></i> Join private room</button>
                <div style="height: 1px; background: rgba(255,255,255,0.1); margin: 4px 0;"></div>
                <button class="dropdown-item" onclick="window.location.href='/room.html?id=public-general'"><i class="fa-solid fa-globe"></i> Join public lobby</button>
            </div>
        </div>
    </div>

    <div id="spatial-hud">
        <i class="fa-solid fa-hand-pointer" style="color: var(--primary); margin-right: 6px;"></i> 
        Drag to look around. Hover over items to interact.
    </div>

    <div id="join-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-icon"><i class="fa-solid fa-door-open"></i></div>
            <h3>Join a Room</h3>
            <p>Enter the 6-digit code or paste the invite link.</p>
            <input type="text" id="join-room-input" class="modal-input" placeholder="e.g. 123456" autocomplete="off">
            <div id="join-error" style="color: var(--danger); font-size: 0.85rem; margin-top: -1rem; margin-bottom: 1rem; display: none; font-weight: 500;">
                Room not found.
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeJoinModal()">Cancel</button>
                <button class="btn-confirm" id="btn-join-submit" onclick="submitJoinRoom()">Join Room</button>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        /* 
         * UNCOMMENT THIS IMPORT IF USING A CUSTOM .glb AVATAR 
         * import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
         */

        const LAMBDA_URL = "https://nvq32ao6fel7xdvfcjhzatg5ja0reeqs.lambda-url.us-east-1.on.aws/";
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        
        const firebaseConfig = { apiKey: "AIzaSyB57PcjYtWktsOGKFLQmWX-Nc6HtYeZxp8", authDomain: "studyspace-f6e22.firebaseapp.com", projectId: "studyspace-f6e22", storageBucket: "studyspace-f6e22.firebasestorage.app", messagingSenderId: "498741408880", appId: "1:498741408880:web:bd5fdea00d10e9329130b5", measurementId: "G-J1X8Y7KDQV" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        window.auth = auth;

        const loginBtn = document.getElementById('nav-login-btn');
        const profileContainer = document.getElementById('user-profile-container');
        
        onAuthStateChanged(auth, (user) => {
            if (user) {
                if(loginBtn) loginBtn.style.display = 'none';
                if(profileContainer) profileContainer.style.display = 'flex';
                document.getElementById('profile-name').textContent = user.displayName || 'Student';
                document.getElementById('profile-email').textContent = user.email || 'No Email'; 
                if(user.photoURL) document.getElementById('user-avatar').src = user.photoURL;
            } else {
                if(loginBtn) loginBtn.style.display = 'block';
                if(profileContainer) profileContainer.style.display = 'none';
            }
        });
        
        if(document.getElementById('logout-btn')) {
            document.getElementById('logout-btn').addEventListener('click', () => signOut(auth).then(() => window.location.reload()));
        }

        // --- ASYNC IMAGE LOADER & CIRCULAR CLIPPING ---
        function loadAvatarImage(url, fallbackName) {
            return new Promise((resolve) => {
                const img = new Image();
                img.crossOrigin = "Anonymous";
                img.onload = () => resolve(img);
                img.onerror = () => {
                    const fallback = new Image();
                    fallback.crossOrigin = "Anonymous";
                    fallback.onload = () => resolve(fallback);
                    fallback.src = `https://api.dicebear.com/7.x/initials/svg?seed=${fallbackName}`;
                };
                img.src = url || `https://api.dicebear.com/7.x/initials/svg?seed=${fallbackName}`;
            });
        }

        function drawCircularAvatar(ctx, img, x, y, radius) {
            if (!img) return;
            ctx.save();
            ctx.beginPath();
            ctx.arc(x + radius, y + radius, radius, 0, Math.PI * 2, true);
            ctx.closePath();
            ctx.clip();
            ctx.drawImage(img, x, y, radius * 2, radius * 2);
            ctx.lineWidth = 4;
            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            ctx.stroke();
            ctx.restore();
        }

        // --- LEADERBOARD TEXTURE ---
        let leaderboardMesh;
        function forceNumber(val) { const num = parseInt(val); return isNaN(num) ? 0 : num; }

        async function createLeaderboardTexture(topUsers, myUser, isLoading) {
            const canvas = document.createElement('canvas');
            canvas.width = 900; 
            canvas.height = 1300;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = 'rgba(15, 23, 42, 0.9)'; // Slate-900 panel
            ctx.beginPath();
            ctx.roundRect(10, 10, 880, 1280, 60);
            ctx.fill();
            ctx.lineWidth = 6;
            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            ctx.stroke();
            ctx.textBaseline = 'middle';

            if (isLoading) {
                ctx.fillStyle = '#94a3b8';
                ctx.font = 'bold 45px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('Synchronizing ranks...', 450, 650);
                const tex = new THREE.CanvasTexture(canvas);
                tex.minFilter = THREE.LinearFilter;
                return tex;
            }

            const avatarPromises = topUsers.map(u => loadAvatarImage(u.photoURL, u.name || 'Student'));
            const loadedAvatars = await Promise.all(avatarPromises);

            let myAvatarImg = null;
            if (myUser) {
                myAvatarImg = await loadAvatarImage(myUser.photoURL, myUser.name || 'Student');
            }

            ctx.textAlign = 'left';
            ctx.fillStyle = '#fbbf24'; 
            ctx.font = 'bold 50px sans-serif';
            ctx.fillText('🏆 TOP SCHOLARS', 60, 100);

            let startY = 200;
            const colors = ['#fbbf24', '#94a3b8', '#b45309']; 

            topUsers.forEach((user, idx) => {
                ctx.fillStyle = 'rgba(2, 6, 23, 0.6)';
                ctx.beginPath();
                ctx.roundRect(50, startY, 800, 140, 40);
                ctx.fill();
                ctx.lineWidth = 4;
                ctx.strokeStyle = 'rgba(255,255,255,0.05)';
                ctx.stroke();

                ctx.fillStyle = colors[idx] || '#94a3b8';
                ctx.font = 'bold 45px sans-serif';
                ctx.fillText(`#${idx+1}`, 90, startY + 70);

                drawCircularAvatar(ctx, loadedAvatars[idx], 180, startY + 25, 45);

                ctx.fillStyle = '#f8fafc';
                ctx.font = '500 40px sans-serif';
                let name = user.name || 'Student';
                if(name.length > 12) name = name.substring(0,12) + '...';
                ctx.fillText(name, 290, startY + 70); 

                ctx.fillStyle = 'rgba(16, 185, 129, 0.15)';
                ctx.beginPath();
                ctx.roundRect(620, startY + 35, 190, 70, 35);
                ctx.fill();
                ctx.fillStyle = '#10b981';
                ctx.textAlign = 'center';
                ctx.font = 'bold 35px sans-serif';
                ctx.fillText(`${forceNumber(user.xp)} XP`, 715, startY + 70);
                ctx.textAlign = 'left';

                startY += 180;
            });

            ctx.fillStyle = 'rgba(255,255,255,0.1)';
            ctx.fillRect(50, startY + 20, 800, 4);
            startY += 70;

            if (myUser) {
                ctx.fillStyle = '#94a3b8';
                ctx.font = 'bold 30px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('YOUR RANK', 450, startY);
                ctx.textAlign = 'left';
                
                startY += 50;

                ctx.fillStyle = 'rgba(99, 102, 241, 0.15)';
                ctx.beginPath();
                ctx.roundRect(50, startY, 800, 140, 40);
                ctx.fill();
                ctx.strokeStyle = 'rgba(99, 102, 241, 0.4)';
                ctx.stroke();

                drawCircularAvatar(ctx, myAvatarImg, 90, startY + 25, 45);

                ctx.fillStyle = '#f8fafc';
                ctx.font = '500 40px sans-serif';
                let name = myUser.name || 'Student';
                if(name.length > 12) name = name.substring(0,12) + '...';
                ctx.fillText(name, 200, startY + 70); 

                ctx.fillStyle = '#6366f1';
                ctx.beginPath();
                ctx.roundRect(620, startY + 35, 190, 70, 35);
                ctx.fill();
                ctx.fillStyle = '#ffffff';
                ctx.textAlign = 'center';
                ctx.font = 'bold 35px sans-serif';
                ctx.fillText(`${forceNumber(myUser.xp)} XP`, 715, startY + 70);
            }

            const texture = new THREE.CanvasTexture(canvas);
            texture.minFilter = THREE.LinearFilter;
            texture.magFilter = THREE.LinearFilter;
            return texture;
        }

        async function updateLeaderboardMesh(topUsers, myUser, isLoading = false) {
            if(leaderboardMesh) {
                const oldMap = leaderboardMesh.material.map;
                const newTexture = await createLeaderboardTexture(topUsers, myUser, isLoading);
                leaderboardMesh.material.map = newTexture;
                leaderboardMesh.material.needsUpdate = true;
                if(oldMap && oldMap.dispose) oldMap.dispose(); 
            }
        }

        async function loadLeaderboardData() {
            try {
                const response = await fetch(LAMBDA_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'getLeaderboard' }) });
                if (!response.ok) throw new Error("Lambda bad");
                const topUsers = await response.json();
                
                let myUser = null;
                await updateLeaderboardMesh(topUsers, myUser); 

                setTimeout(async () => {
                    if (window.auth && window.auth.currentUser) {
                        const uid = window.auth.currentUser.uid;
                        try {
                            const token = await window.auth.currentUser.getIdToken();
                            const userRes = await fetch(LAMBDA_URL, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ action: 'getUserData', uid: uid }) });
                            if (userRes.ok) { 
                                const uD = await userRes.json(); 
                                if (uD) {
                                    myUser = { name: uD.name || window.auth.currentUser.displayName, xp: uD.xp, photoURL: window.auth.currentUser.photoURL }; 
                                }
                            }
                        } catch (e) {}
                        await updateLeaderboardMesh(topUsers, myUser); 
                    }
                }, 1000); 

            } catch (error) { console.error("3D Leaderboard fetch failed", error); }
        }

        // --- OPTIMIZED THREE.JS ENGINE (MOUNTAIN THEME) ---
        let scene, camera, renderer, controls;
        let interactiveMeshes = [];
        let aiAvatarGroup; 
        let modelMixer; // For GLTF animations if used
        
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const hudElement = document.getElementById('spatial-hud');

        async function initSpatialEngine() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020617); // Night sky
            scene.fog = new THREE.FogExp2(0x020617, 0.02);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 14); 

            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(1); 
            renderer.shadowMap.enabled = false;
            document.getElementById('webgl-container').appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 - 0.05; 
            controls.minDistance = 4;
            controls.maxDistance = 25;

            // Lighting
            const ambient = new THREE.AmbientLight(0xffffff, 0.3);
            scene.add(ambient);
            
            const moonLight = new THREE.DirectionalLight(0xa5b4fc, 1.2); // Cool moon
            moonLight.position.set(-10, 20, 10);
            scene.add(moonLight);

            const fireLight = new THREE.PointLight(0xfbbf24, 1.5, 20); // Warm glow
            fireLight.position.set(0, 2, 5);
            scene.add(fireLight);

            await buildEnvironment();
            await buildAvatar();
            await buildInteractiveIcons();

            window.addEventListener('resize', onResizeWindow);
            window.addEventListener('mousemove', onSpatialHover);
            window.addEventListener('click', onSpatialInteract);
        }

        async function buildEnvironment() {
            // Floor
            const floorGeo = new THREE.PlaneGeometry(80, 80);
            const floorMat = new THREE.MeshLambertMaterial({ color: 0x064e3b }); // Deep dark green/black
            const floorGrid = new THREE.Mesh(floorGeo, floorMat);
            floorGrid.rotation.x = -Math.PI / 2;
            scene.add(floorGrid);

            // Procedural Mountains
            const mountainMat = new THREE.MeshLambertMaterial({ color: 0x0f172a, flatShading: true });
            for(let i=0; i<20; i++) {
                const height = Math.random() * 15 + 10;
                const radius = height * 0.8;
                const mountainGeo = new THREE.ConeGeometry(radius, height, 4);
                const mountain = new THREE.Mesh(mountainGeo, mountainMat);
                
                // Distribute in a semi-circle behind
                const angle = (Math.random() * Math.PI) - (Math.PI / 2); // -90 to 90
                const distance = 25 + Math.random() * 15;
                mountain.position.set(Math.sin(angle) * distance, height/2, -Math.cos(angle) * distance);
                mountain.rotation.y = Math.random() * Math.PI;
                scene.add(mountain);
            }

            // Right-Back Side Leaderboard
            const bannerGeo = new THREE.PlaneGeometry(5.4, 7.8); 
            const bannerMat = new THREE.MeshBasicMaterial({ transparent: true, side: THREE.DoubleSide });
            leaderboardMesh = new THREE.Mesh(bannerGeo, bannerMat);
            leaderboardMesh.position.set(8, 4.5, -2); 
            leaderboardMesh.rotation.y = -Math.PI / 6; 
            scene.add(leaderboardMesh);
            
            await updateLeaderboardMesh([], null, true); 
            loadLeaderboardData(); 
        }

        async function buildAvatar() {
            aiAvatarGroup = new THREE.Group();

            /* 
            =============================================================
            HOW TO USE A REAL HUMAN GLTF MODEL INSTEAD OF THE BOX AVATAR:
            =============================================================
            1. Uncomment the GLTFLoader import at the top of the script.
            2. Use this block of code:
            
            const loader = new GLTFLoader();
            loader.load('URL_TO_YOUR_AVATAR.glb', (gltf) => {
                const model = gltf.scene;
                model.scale.set(2, 2, 2); 
                model.position.set(0, 0, 0);
                aiAvatarGroup.add(model);
                
                // If the model has animations (like idle breathing):
                // modelMixer = new THREE.AnimationMixer(model);
                // modelMixer.clipAction(gltf.animations[0]).play();
            });
            =============================================================
            */

            // Procedural Low-Poly Humanoid (Fallback)
            const skinMat = new THREE.MeshLambertMaterial({ color: 0xfcd34d }); // Warm skin
            const shirtMat = new THREE.MeshLambertMaterial({ color: 0x6366f1 }); // Indigo shirt
            const pantsMat = new THREE.MeshLambertMaterial({ color: 0x1e293b }); // Slate pants

            const head = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), skinMat);
            head.position.y = 3.2;
            
            const torso = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.4, 0.6), shirtMat);
            torso.position.y = 2.1;

            const leftArm = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.3, 0.4), skinMat);
            leftArm.position.set(-0.8, 2.1, 0);

            const rightArm = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.3, 0.4), skinMat);
            rightArm.position.set(0.8, 2.1, 0);

            const leftLeg = new THREE.Mesh(new THREE.BoxGeometry(0.5, 1.4, 0.5), pantsMat);
            leftLeg.position.set(-0.35, 0.7, 0);

            const rightLeg = new THREE.Mesh(new THREE.BoxGeometry(0.5, 1.4, 0.5), pantsMat);
            rightLeg.position.set(0.35, 0.7, 0);

            aiAvatarGroup.add(head, torso, leftArm, rightArm, leftLeg, rightLeg);
            aiAvatarGroup.position.set(0, 0, 4); 
            scene.add(aiAvatarGroup);
        }

        async function buildInteractiveIcons() {
            // Helper function to attach userData to all children so raycaster hits them
            const attachData = (group, data) => {
                group.userData = data;
                group.children.forEach(c => c.userData = data);
            };

            const matPrimary = new THREE.MeshLambertMaterial({ color: 0x6366f1 });
            const matAccent = new THREE.MeshLambertMaterial({ color: 0x34d399 });
            const matGold = new THREE.MeshLambertMaterial({ color: 0xfbbf24 });
            const matWhite = new THREE.MeshLambertMaterial({ color: 0xffffff });

            // 1. Question Bank (Stack of Books)
            const bookGroup = new THREE.Group();
            const bookCover = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.1, 0.9), matPrimary);
            const bookPages = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.3, 0.8), matWhite);
            bookPages.position.y = 0.2;
            const bookCoverTop = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.1, 0.9), matPrimary);
            bookCoverTop.position.y = 0.4;
            bookGroup.add(bookCover, bookPages, bookCoverTop);
            bookGroup.position.set(-6, 4.5, 0);
            attachData(bookGroup, { type: 'feature', name: 'Question Bank', url: '/practice.html' });
            scene.add(bookGroup);
            interactiveMeshes.push(bookGroup);

            // 2. Live Collab (Video Camera)
            const camGroup = new THREE.Group();
            const camBody = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.8, 0.8), matAccent);
            const camLens = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 0.5, 16), matWhite);
            camLens.rotation.z = Math.PI / 2;
            camLens.position.set(0.8, 0, 0);
            const camReel = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.1, 16), matWhite);
            camReel.rotation.x = Math.PI / 2;
            camReel.position.set(-0.3, 0.6, 0);
            camGroup.add(camBody, camLens, camReel);
            camGroup.position.set(-8, 3.5, -2);
            attachData(camGroup, { type: 'feature', name: 'Live Collaboration', url: '/rooms' });
            scene.add(camGroup);
            interactiveMeshes.push(camGroup);

            // 3. Analytics (Bar Chart)
            const chartGroup = new THREE.Group();
            const base = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.1, 0.6), matWhite);
            const bar1 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.6, 0.3), matGold);
            bar1.position.set(-0.5, 0.35, 0);
            const bar2 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.2, 0.3), matGold);
            bar2.position.set(0, 0.65, 0);
            const bar3 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.9, 0.3), matGold);
            bar3.position.set(0.5, 0.5, 0);
            chartGroup.add(base, bar1, bar2, bar3);
            chartGroup.position.set(-4, 2.5, 2);
            attachData(chartGroup, { type: 'feature', name: 'Performance Analytics', url: '/analytics' });
            scene.add(chartGroup);
            interactiveMeshes.push(chartGroup);

            // 4. Doors (Public Rooms)
            const roomConfig = [
                { name: 'General Lounge', route: 'public-general', color: 0xfbbf24, pos: new THREE.Vector3(-12, 2.5, -6), rot: Math.PI / 6 },
                { name: 'Pomodoro Focus', route: 'public-pomodoro', color: 0xef4444, pos: new THREE.Vector3(-9, 2.5, -10), rot: Math.PI / 8 },
                { name: 'Quiet Reading', route: 'public-quiet', color: 0x10b981, pos: new THREE.Vector3(-5, 2.5, -13), rot: 0 }
            ];

            roomConfig.forEach(room => {
                const doorGroup = new THREE.Group();
                const doorBox = new THREE.Mesh(new THREE.BoxGeometry(2.5, 5, 0.2), new THREE.MeshLambertMaterial({ color: room.color }));
                const doorFrame = new THREE.Mesh(new THREE.BoxGeometry(2.8, 5.2, 0.1), new THREE.MeshLambertMaterial({ color: 0x334155 }));
                doorFrame.position.z = -0.1;
                doorGroup.add(doorBox, doorFrame);
                doorGroup.position.copy(room.pos);
                doorGroup.rotation.y = room.rot;
                attachData(doorGroup, { type: 'room', name: room.name, url: `/room.html?id=${room.route}` });
                scene.add(doorGroup);
                interactiveMeshes.push(doorGroup);
            });
        }

        // Raycasting Logic
        function onSpatialHover(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            
            // Collect all children meshes from the interactive groups
            let hitTargets = [];
            interactiveMeshes.forEach(group => hitTargets.push(...group.children));

            const intersections = raycaster.intersectObjects(hitTargets);

            if (intersections.length > 0) {
                const target = intersections[0].object;
                hudElement.innerHTML = `<i class="fa-solid fa-link" style="color: var(--primary); margin-right:6px;"></i> Click to access: <strong>${target.userData.name}</strong>`;
                document.body.style.cursor = 'pointer';
            } else {
                hudElement.innerHTML = `<i class="fa-solid fa-hand-pointer" style="color: var(--primary); margin-right: 6px;"></i> Drag to look around. Hover over items to explore.`;
                document.body.style.cursor = 'default';
            }
        }

        function onSpatialInteract(event) {
            if (event.clientY < 75 || (event.clientX > (window.innerWidth - 380) && event.clientY > (window.innerHeight - 100))) return;

            raycaster.setFromCamera(mouse, camera);
            let hitTargets = [];
            interactiveMeshes.forEach(group => hitTargets.push(...group.children));
            const intersections = raycaster.intersectObjects(hitTargets);

            if (intersections.length > 0) {
                const target = intersections[0].object;
                if (target.userData.url) window.location.href = target.userData.url;
            }
        }

        function onResizeWindow() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        const clock = new THREE.Clock();

        function renderFrameLoop() {
            requestAnimationFrame(renderFrameLoop);
            controls.update();

            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            if (modelMixer) modelMixer.update(delta);

            if (aiAvatarGroup) {
                // Subtle floating/breathing animation for the procedural avatar
                aiAvatarGroup.position.y = Math.sin(time * 2) * 0.1; 
            }

            if (leaderboardMesh) {
                leaderboardMesh.position.y = 4.5 + Math.sin(time * 0.8) * 0.15; 
            }

            interactiveMeshes.forEach((group, index) => {
                if (group.userData.type === 'feature') {
                    group.rotation.y += 0.01;
                    group.rotation.x = Math.sin(time * 1.5 + index) * 0.2; // Slight wobble
                    group.position.y += Math.sin(time * 3 + index) * 0.005; // Float
                }
            });

            renderer.render(scene, camera);
        }

        initSpatialEngine();
        renderFrameLoop();
    </script>

    <script>
    function checkLogin() {
        if (!window.auth || !window.auth.currentUser) {
            sessionStorage.setItem('returnUrl', window.location.href);
            window.location.href = '/login.html';
            return false;
        }
        return true;
    }
    function createPrivateRoom() {
        if (!checkLogin()) return; 
        const numericalCode = Math.floor(100000 + Math.random() * 900000).toString();
        window.location.href = `/room.html?id=${numericalCode}`;
    }
    function joinPrivateRoom() {
        if (!checkLogin()) return; 
        document.getElementById('join-modal').classList.add('active');
        const input = document.getElementById('join-room-input');
        if(input) { input.placeholder = "Enter 6-digit code (e.g. 123456)"; input.focus(); }
    }
    function closeJoinModal() {
        document.getElementById('join-modal').classList.remove('active');
    }
    function submitJoinRoom() {
        if (!checkLogin()) return; 
        const input = document.getElementById('join-room-input').value.trim();
        if (!input) return;
        let roomId = input;
        if (input.includes('id=')) roomId = input.split('id=')[1].split('&')[0];
        else if (input.includes('/room/')) roomId = input.split('/room/').pop();
        roomId = roomId.replace(/\//g, '');
        if (roomId) window.location.href = `/room.html?id=${roomId}`;
    }
    </script>
