<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudySpace | Collaborative Learning</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f111a;
            --card-bg: #1e2130;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --accent: #10b981;
            --danger: #ef4444;
            --gold: #fbbf24;
            --border: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
        }

        /* --- Modal Styles --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 16px; padding: 2rem; width: 90%; max-width: 450px;
        }
        .modal-input {
            width: 100%; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 1rem; border-radius: 8px; margin: 1rem 0; outline: none;
        }
        .modal-actions { display: flex; gap: 1rem; justify-content: flex-end; }
        .btn-confirm { background: var(--primary); color: white; padding: 0.6rem 1.5rem; border: none; border-radius: 8px; }

        /* --- Navigation & Hero --- */
        #auth-nav { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 5%; }
        .logo-text { font-size: 1.5rem; font-weight: 800; color: var(--text-main); text-decoration: none; }
        .btn-login { background-color: var(--primary); color: white; padding: 0.6rem 1.5rem; border-radius: 8px; }
        .main-container { max-width: 1200px; margin: 0 auto; padding: 4rem 2rem; text-align: center; }
        .hero-title { font-size: 4rem; margin-bottom: 1rem; }
        .hero-title span { background: linear-gradient(to right, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Dropdown & Dashboard Styles (Kept your existing ones) */
        .session-dropdown-wrapper { position: relative; display: inline-block; }
        .dropdown-menu { position: absolute; top: 120%; left: 50%; transform: translateX(-50%); background: rgba(30, 33, 48, 0.95); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 0.5rem; display: flex; flex-direction: column; opacity: 0; visibility: hidden; transition: all 0.3s ease; z-index: 50; }
        .session-dropdown-wrapper:hover .dropdown-menu { opacity: 1; visibility: visible; }
        .dropdown-item { background: transparent; color: var(--text-main); padding: 0.8rem 1rem; border-radius: 8px; border: none; text-align: left; cursor: pointer; }
        .dropdown-item:hover { background: rgba(99, 102, 241, 0.15); }
        .btn-start-session { background: var(--text-main); color: var(--bg-color); padding: 1rem 2.5rem; border-radius: 12px; font-weight: 800; }
    </style>
</head>
<body>

    <nav id="auth-nav">
        <a href="/" class="logo-text">🚀 StudySpace</a>
        <div class="nav-actions">
            <button id="nav-login-btn" class="btn-login" onclick="window.location.href='/login.html'">Log In / Sign Up</button>
            <div id="user-profile-container" style="display: none; align-items: center; gap: 1rem;">
                <img id="user-avatar" style="width:40px; height:40px; border-radius:50%;" src="" alt="Avatar">
                <button id="logout-btn" style="background:transparent; color:var(--danger); border:1px solid var(--danger); padding:0.4rem 0.8rem;">Log Out</button>
            </div>
        </div>
    </nav>

    <div id="join-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>Join a Study Room</h3>
            <p>Paste your friend's invite link or enter the Room ID.</p>
            <input type="text" id="join-room-input" class="modal-input" placeholder="Room ID..." autocomplete="off">
            <div id="join-error" style="color: var(--danger); display: none; margin-bottom: 1rem;">❌ Room not found.</div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeJoinModal()">Cancel</button>
                <button class="btn-confirm" id="btn-join-submit" onclick="submitJoinRoom()">Join Room</button>
            </div>
        </div>
    </div>

    <main class="main-container">
        <header class="hero-section">
            <h1 class="hero-title">Welcome to <span>StudySpace</span></h1>
            <div class="session-dropdown-wrapper">
                <button class="btn-start-session">Start a Live Session</button>
                <div class="dropdown-menu">
                    <button class="dropdown-item" onclick="createPrivateRoom()">🔒 Create a new room</button>
                    <button class="dropdown-item" onclick="joinPrivateRoom()">🔑 Join a private room</button>
                </div>
            </div>
        </header>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = { /* ... your config ... */ };
        const app = initializeApp(firebaseConfig);
        window.auth = getAuth(app); // Global auth

        const loginBtn = document.getElementById('nav-login-btn');
        const profileContainer = document.getElementById('user-profile-container');
        const logoutBtn = document.getElementById('logout-btn');

        onAuthStateChanged(window.auth, (user) => {
            if (user) {
                loginBtn.style.display = 'none';
                profileContainer.style.display = 'flex';
                localStorage.setItem('studySpaceUserName', user.displayName || 'Student');
            }
        });

        logoutBtn.addEventListener('click', () => {
            signOut(window.auth).then(() => window.location.reload());
        });
    </script>

    <script>
        function createPrivateRoom() {
            if (!window.auth.currentUser) {
                sessionStorage.setItem('returnUrl', window.location.href);
                window.location.href = '/login.html';
                return;
            }
            const randomRoomId = Math.random().toString(36).substring(2, 10);
            window.location.href = `/room/${randomRoomId}`;
        }

        function joinPrivateRoom() {
            document.getElementById('join-modal').classList.add('active');
        }

        function closeJoinModal() {
            document.getElementById('join-modal').classList.remove('active');
        }

        async function submitJoinRoom() {
            if (!window.auth.currentUser) {
                sessionStorage.setItem('returnUrl', window.location.href);
                window.location.href = '/login.html';
                return;
            }
            const input = document.getElementById('join-room-input').value.trim();
            if (input) window.location.href = `/room/${input.split('/').pop()}`;
        }
    </script>
</body>
</html>
