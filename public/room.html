<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Room | StudySpace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-color: #0f111a; --card-bg: #1e2130; --text-main: #f8fafc; --text-muted: #94a3b8; --primary: #6366f1; --accent: #10b981; --danger: #ef4444; --btn-off: #334155; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { background-color: var(--bg-color); color: var(--text-main); height: 100vh; display: flex; overflow: hidden; }
        
        /* Main Layout */
        #main-content { flex: 1; display: flex; flex-direction: column; position: relative; transition: all 0.3s ease; }
        
        #activity-warning { background: var(--danger); color: white; text-align: center; padding: 0.8rem; font-weight: 600; font-size: 0.9rem; display: none; z-index: 100; }
        .room-header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; background: rgba(15, 17, 26, 0.8); backdrop-filter: blur(10px); z-index: 10; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .room-title { font-size: 1.2rem; font-weight: 800; }
        .timer-badge { font-family: monospace; font-size: 1.2rem; color: var(--accent); background: rgba(16, 185, 129, 0.1); padding: 0.4rem 1rem; border-radius: 8px; }

        /* Video Grid */
        #video-grid { flex-grow: 1; display: grid; gap: 1rem; padding: 1.5rem; align-content: center; justify-content: center; overflow-y: auto; }
        .video-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .name-badge { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); padding: 5px 12px; border-radius: 6px; font-size: 0.85rem; font-weight: 600; z-index: 2; }

        /* Controls */
        .controls-wrapper { position: absolute; bottom: 2rem; left: 0; width: 100%; display: flex; justify-content: center; pointer-events: none; z-index: 20; }
        .control-bar { background: rgba(30, 33, 48, 0.9); backdrop-filter: blur(15px); padding: 1rem 1.5rem; border-radius: 100px; display: flex; gap: 1rem; pointer-events: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); align-items: center; }
        .btn-media { width: 50px; height: 50px; border-radius: 50%; border: none; font-size: 1.2rem; cursor: pointer; transition: all 0.2s ease; display: flex; justify-content: center; align-items: center; color: white; }
        .btn-on { background: var(--primary); }
        .btn-off { background: var(--btn-off); color: #cbd5e1; }
        .btn-danger { background: var(--danger); }
        #btn-join { background: var(--accent); padding: 0 1.5rem; font-weight: 600; display: none; gap: 8px; border-radius: 100px; border: none; color: white; cursor: pointer; height: 50px; }

        /* Chat Panel */
        #chat-panel { width: 350px; background: var(--card-bg); border-left: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; transition: all 0.3s ease; }
        .chat-header { padding: 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 10px; }
        .message { background: rgba(255,255,255,0.05); padding: 10px 12px; border-radius: 8px; font-size: 0.9rem; }
        .message.mine { background: rgba(99, 102, 241, 0.2); border-bottom-right-radius: 0; align-self: flex-end; }
        .message.theirs { border-bottom-left-radius: 0; align-self: flex-start; }
        .msg-author { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px; font-weight: 600; }
        .chat-input-area { padding: 1rem; border-top: 1px solid rgba(255,255,255,0.05); display: flex; gap: 8px; }
        #chat-input { flex: 1; padding: 0.8rem; border-radius: 8px; border: none; background: rgba(0,0,0,0.3); color: white; outline: none; }
        #btn-send { background: var(--primary); border: none; color: white; padding: 0 1rem; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="main-content">
        <div id="activity-warning">⏳ You have 2 minutes to turn on a device, or you will be removed for inactivity.</div>
        <div class="room-header">
            <div class="room-title" id="room-id-display">Loading...</div>
            <div class="timer-badge">⏱ <span id="timer-display">00:00</span></div>
        </div>
        
        <div id="video-grid">
            <div class="video-container" id="local-player-wrapper" style="display: none;">
                <div id="local-player" style="width: 100%; height: 100%;"></div>
                <div class="name-badge">You (Preview)</div>
            </div>
        </div>

        <div class="controls-wrapper">
            <div class="control-bar">
                <button id="btn-mic" class="btn-media btn-off"><i class="fa-solid fa-microphone-slash"></i></button>
                <button id="btn-cam" class="btn-media btn-off"><i class="fa-solid fa-video-slash"></i></button>
                <button id="btn-chat" class="btn-media btn-on"><i class="fa-solid fa-message"></i></button>
                
                <button id="btn-join"><i class="fa-solid fa-right-to-bracket"></i> Join Room</button>
                
                <div style="width: 2px; height: 30px; background: rgba(255,255,255,0.1); margin: 0 5px;"></div>
                <button class="btn-media btn-danger" onclick="window.location.href='/'"><i class="fa-solid fa-phone-slash"></i></button>
            </div>
        </div>
    </div>

    <div id="chat-panel">
        <div class="chat-header">
            <span><i class="fa-solid fa-comments"></i> Room Chat</span>
            <button id="close-chat" style="background: none; border: none; color: var(--text-muted); cursor: pointer;"><i class="fa-solid fa-times"></i></button>
        </div>
        <div id="chat-messages">
            <div style="text-align: center; color: var(--text-muted); font-size: 0.8rem; margin-top: 1rem;">Welcome to the chat!</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off">
            <button id="btn-send"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <script type="module" src="/roomLogic.js"></script>
</body>
</html>
