<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Study Room | StudySpace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/room.css">
</head>
<body>

    <div id="lobby-screen">
        <div class="lobby-card">
            <div class="lobby-profile">
                <img id="lobby-avatar" class="lobby-avatar" src="https://www.gravatar.com/avatar/?d=mp" alt="Avatar">
                <div id="lobby-name" class="lobby-name">Loading Profile...</div>
                <div style="color: var(--text-muted); font-size: 0.85rem; font-weight: 400;">Set up your audio and video before joining</div>
            </div>
            
            <div class="lobby-preview-box cam-off" id="lobby-preview-container">
                <img id="lobby-main-avatar" class="main-avatar" src="https://www.gravatar.com/avatar/?d=mp" alt="Avatar Preview">
                <div id="lobby-video-preview" class="agora-video-view"></div>
            </div>
            
            <div style="display: flex; gap: 1.5rem; justify-content: center;">
                <button id="lobby-btn-mic" class="btn-media btn-off"><i class="fa-solid fa-microphone-slash"></i></button>
                <button id="lobby-btn-cam" class="btn-media btn-off"><i class="fa-solid fa-video-slash"></i></button>
            </div>
            
            <button id="btn-join">Join Room Now</button>
        </div>
    </div>

    <div id="main-content">
        <div id="activity-warning">⏳ You have 2 minutes to turn on a device, or you will be removed.</div>
        <div class="room-header">
            <div class="room-title" id="room-id-display">Loading...</div>
            <div class="timer-badge"><span id="timer-display">00:00</span></div>
        </div>
        
        <div id="video-grid">
            <div class="video-container cam-off" id="local-player-wrapper" style="display: none;">
                <img id="local-main-avatar" class="main-avatar" src="https://www.gravatar.com/avatar/?d=mp" alt="Avatar Profile">
                <div id="local-player" class="agora-video-view"></div>
                <div class="name-badge">
                    <img id="local-badge-avatar" class="badge-avatar" src="https://www.gravatar.com/avatar/?d=mp" alt="User Avatar">
                    <span id="local-badge-name">You</span>
                </div>
            </div>
        </div>

        <div class="controls-wrapper">
            <div class="control-bar">
                <button id="main-btn-mic" class="btn-media btn-off"><i class="fa-solid fa-microphone-slash"></i></button>
                <button id="main-btn-cam" class="btn-media btn-off"><i class="fa-solid fa-video-slash"></i></button>
                <button id="btn-chat" class="btn-media btn-off"><i class="fa-solid fa-message"></i></button>
                <div style="width: 1px; height: 24px; background: var(--border-light); margin: 0 4px;"></div>
                <button class="btn-media btn-danger" onclick="window.location.href='/'"><i class="fa-solid fa-phone-slash"></i></button>
            </div>
        </div>
    </div>

    <div id="chat-panel">
        <div class="chat-header">
            <span>Room Chat</span>
            <button id="close-chat" style="background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px;"><i class="fa-solid fa-times" style="font-size: 1.1rem;"></i></button>
        </div>
        <div id="chat-messages">
            <div style="text-align: center; color: var(--text-muted); font-size: 0.75rem; margin-top: 0.5rem; letter-spacing: 0.5px; text-transform: uppercase;">Start of conversation</div>
        </div>
        <div class="chat-input-area">
            <div class="input-wrapper">
                <input type="text" id="chat-input" placeholder="Message room..." autocomplete="off">
                <button id="btn-send"><i class="fa-solid fa-arrow-up"></i></button>
            </div>
        </div>
    </div>

    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <script type="module" src="/js/room.js"></script>
</body>
</html>
