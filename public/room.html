<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Room | StudySpace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-color: #0f111a; --card-bg: #1e2130; --text-main: #f8fafc; --text-muted: #94a3b8; --primary: #6366f1; --accent: #10b981; --danger: #ef4444; --btn-off: #334155; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { background-color: var(--bg-color); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Warnings & Headers */
        #activity-warning { background: var(--danger); color: white; text-align: center; padding: 0.8rem; font-weight: 600; font-size: 0.9rem; display: none; z-index: 100; }
        .room-header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; background: rgba(15, 17, 26, 0.8); backdrop-filter: blur(10px); z-index: 10; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .room-title { font-size: 1.2rem; font-weight: 800; }
        .timer-badge { font-family: monospace; font-size: 1.2rem; color: var(--accent); background: rgba(16, 185, 129, 0.1); padding: 0.4rem 1rem; border-radius: 8px; }

        /* Discord-Style Dynamic Grid */
        #video-grid { 
            flex-grow: 1; 
            display: grid; 
            gap: 1rem; 
            padding: 1.5rem; 
            align-content: center; 
            justify-content: center; 
            overflow-y: auto;
            /* JS will dynamically update the grid columns */
        }

        .video-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            aspect-ratio: 16/9;
            transition: all 0.3s ease;
        }

        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            border-radius: 12px; 
            background: #000; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 3px solid transparent; 
            transition: all 0.2s ease;
        }

        /* Zoom-Style Speaking Highlight */
        .video-container.speaking video {
            border-color: var(--accent);
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.6);
            transform: scale(1.02);
        }

        .name-badge {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            z-index: 2;
        }

        /* Floating Control Bar */
        .controls-wrapper { position: fixed; bottom: 2rem; left: 0; width: 100%; display: flex; justify-content: center; pointer-events: none; z-index: 20; }
        .control-bar { background: rgba(30, 33, 48, 0.9); backdrop-filter: blur(15px); padding: 1rem 1.5rem; border-radius: 100px; display: flex; gap: 1rem; pointer-events: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); align-items: center; }
        
        .btn-media { width: 50px; height: 50px; border-radius: 50%; border: none; font-size: 1.2rem; cursor: pointer; transition: all 0.2s ease; display: flex; justify-content: center; align-items: center; color: white; }
        .btn-on { background: var(--primary); }
        .btn-off { background: var(--btn-off); color: #cbd5e1; }
        .btn-danger { background: var(--danger); }
        .btn-media:hover { filter: brightness(1.2); transform: translateY(-2px); }
        
        /* Explicit Join Button for Preview Phase */
        #btn-join { background: var(--accent); width: auto; padding: 0 1.5rem; font-weight: 600; display: none; gap: 8px; border-radius: 100px; }
    /* --- MOBILE RESPONSIVENESS FOR ROOM.HTML --- */
@media (max-width: 768px) {
    /* Stack header so the timer doesn't overlap the room code */
    .room-header { 
        padding: 0.8rem; 
        flex-direction: column; 
        gap: 0.5rem; 
        text-align: center; 
    }
    .room-title { font-size: 0.95rem; }
    
    /* Shrink the floating control bar to fit the screen */
    .controls-wrapper { bottom: 1rem; }
    .control-bar { 
        width: 95%; 
        padding: 0.8rem; 
        gap: 0.5rem; 
        justify-content: space-evenly; 
        border-radius: 20px; 
    }
    
    /* Shrink the buttons slightly */
    .btn-media { 
        width: 45px; 
        height: 45px; 
        font-size: 1rem; 
    }
    #btn-join { 
        padding: 0 1rem; 
        font-size: 0.9rem; 
    }
    
    /* Give the video grid room to breathe above the control bar */
    #video-grid { 
        padding: 0.5rem; 
        padding-bottom: 90px; /* Prevents control bar from covering videos */
        gap: 0.5rem; 
    }
    
    /* Force videos to stack vertically on mobile */
    #video-grid {
        grid-template-columns: 1fr !important;
    }
}
/* --- CHAT SYSTEM UI --- */
#chat-panel { position: fixed; right: 0; top: 0; width: 350px; height: 100vh; background: var(--card-bg); border-left: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; z-index: 100; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
#chat-panel.open { transform: translateX(0); }
.chat-header { padding: 1.5rem; font-weight: 800; border-bottom: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); display: flex; justify-content: space-between; align-items: center; }
#chat-messages { flex-grow: 1; padding: 1rem; overflow-y: auto; display: flex; flex-direction: column; gap: 0.8rem; }
.message { background: rgba(255,255,255,0.05); padding: 0.8rem; border-radius: 8px; font-size: 0.9rem; word-break: break-word; }
.message.self { background: rgba(99, 102, 241, 0.15); border: 1px solid rgba(99, 102, 241, 0.3); align-self: flex-end; }
.msg-sender { font-weight: 800; font-size: 0.75rem; color: var(--accent); margin-bottom: 0.3rem; text-transform: uppercase; letter-spacing: 0.5px; }
.chat-input-area { padding: 1rem; border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap: 0.5rem; background: rgba(0,0,0,0.2); padding-bottom: 2rem; }
#chat-input { flex-grow: 1; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 0.8rem; border-radius: 8px; outline: none; }
#chat-input:focus { border-color: var(--primary); }
#btn-send { background: var(--primary); color: white; border: none; padding: 0 1.2rem; border-radius: 8px; cursor: pointer; transition: 0.2s; }
#btn-send:hover { background: var(--primary-hover); }

/* Responsive adjustments */
@media (min-width: 769px) {
    /* Push the video grid out of the way when chat opens on desktop */
    body:has(#chat-panel.open) #video-grid { padding-right: 350px; }
    body:has(#chat-panel.open) .controls-wrapper { padding-right: 350px; }
}
@media (max-width: 768px) {
    #chat-panel { width: 100%; } 
}
    </style>
</head>
<body>

    <div id="activity-warning">⏳ You have 2 minutes to turn on a device, or you will be removed for inactivity.</div>

    <div class="room-header">
        <div class="room-title" id="room-id-display">Loading...</div>
        <div class="timer-badge">⏱ <span id="timer-display">00:00</span></div>
    </div>

    <div id="video-grid"></div>
    <div id="chat-panel">
    <div class="chat-header">
        <span><i class="fa-solid fa-comments"></i> Room Chat</span>
        <button id="btn-close-chat" style="background:transparent; border:none; color:white; font-size:1.2rem; cursor:pointer;"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div id="chat-messages"></div>
    <div class="chat-input-area">
        <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off">
        <button id="btn-send"><i class="fa-solid fa-paper-plane"></i></button>
    </div>
</div>

    <div class="controls-wrapper">
        <div class="control-bar">
            <button id="btn-mic" class="btn-media btn-off" title="Toggle Microphone"><i class="fa-solid fa-microphone-slash"></i></button>
            <button id="btn-cam" class="btn-media btn-off" title="Toggle Camera"><i class="fa-solid fa-video-slash"></i></button>
            <button id="btn-screen" class="btn-media btn-off" title="Share Screen"><i class="fa-solid fa-display"></i></button>
            <button id="btn-screen" class="btn-media btn-off" title="Share Screen"><i class="fa-solid fa-display"></i></button>
            <button id="btn-chat" class="btn-media btn-off" title="Toggle Chat"><i class="fa-solid fa-message"></i></button>
            <button id="btn-join"><i class="fa-solid fa-right-to-bracket"></i> Join Room</button>
            
            <div style="width: 2px; height: 30px; background: rgba(255,255,255,0.1); margin: 0 5px;"></div>
            <button class="btn-media btn-danger" onclick="window.location.href='/'" title="Leave Room"><i class="fa-solid fa-phone-slash"></i></button>
        </div>
    </div>

    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.2.js"></script>
    <script type="module" src="/roomLogic.js"></script>
</body>
</html>
