<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Room | StudySpace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    
    <script defer src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script defer src="/roomLogic.js"></script>

    <style>
        :root {
            --bg-color: #0f111a;
            --panel-bg: #1e2130;
            --text-main: #f8fafc;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --danger: #ef4444;
            --border: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Navigation */
        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: var(--panel-bg);
            border-bottom: 1px solid var(--border);
            height: 70px;
        }

        .room-title { font-size: 1.2rem; font-weight: 800; display: flex; align-items: center; gap: 0.5rem;}
        .room-id-badge {
            background: rgba(99, 102, 241, 0.15);
            color: var(--primary);
            padding: 0.3rem 0.8rem;
            border-radius: 6px;
            font-size: 0.85rem;
            font-family: monospace;
            letter-spacing: 1px;
        }

        .btn-leave {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .btn-leave:hover { background: var(--danger); color: white; }

        /* Main Workspace */
        .main-workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
            padding: 1rem;
            gap: 1rem;
        }

        /* Left: Video Area */
        .video-section {
            flex: 3;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background: var(--panel-bg);
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 1rem;
        }

        #video-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1rem;
            overflow-y: auto;
        }

        /* Toolbar Controls */
        .controls-bar {
            display: flex;
            justify-content: center;
            gap: 1rem;
            padding: 1rem 0 0.5rem 0;
            border-top: 1px solid var(--border);
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .control-btn:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-2px); }
        
        /* Red state when turned off */
        .control-btn.off { 
            background: rgba(239, 68, 68, 0.1); 
            color: var(--danger); 
            border-color: rgba(239, 68, 68, 0.3); 
        }

        /* Icon Swapping Magic */
        .control-btn .icon-off { display: none; }
        .control-btn.off .icon-on { display: none; }
        .control-btn.off .icon-off { display: block; }

        .btn-invite {
            background: var(--primary);
            color: white;
            border-radius: 8px;
            padding: 0 1.5rem;
            width: auto;
            border: none;
            font-weight: 600;
            gap: 0.5rem;
        }
        .btn-invite:hover { background: var(--primary-hover); }

        /* Right: Chat Area */
        .chat-section {
            flex: 1;
            min-width: 300px;
            max-width: 400px;
            background: var(--panel-bg);
            border-radius: 16px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        #chat-window {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        /* Beautiful Chat Bubbles */
        .message {
            background: rgba(255, 255, 255, 0.05);
            padding: 0.8rem 1rem;
            border-radius: 12px;
            border-top-left-radius: 2px;
            align-self: flex-start;
            max-width: 85%;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .message.me {
            background: rgba(99, 102, 241, 0.15);
            border-radius: 12px;
            border-top-right-radius: 2px;
            align-self: flex-end;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        #chat-form {
            display: flex;
            padding: 1rem;
            gap: 0.5rem;
            border-top: 1px solid var(--border);
            background: rgba(0,0,0,0.2);
        }

        #chat-input {
            flex: 1;
            background: var(--bg-color);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.8rem 1rem;
            border-radius: 8px;
            outline: none;
        }

        #chat-input:focus { border-color: var(--primary); }

        .btn-send {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <header class="room-header">
        <div class="room-title">
            <span id="timer-display" style="margin-left: 20px; font-family: monospace; color: var(--accent);">00:00</span>
            🔒 Private Session <span id="display-room-id" class="room-id-badge">Loading...</span>
        </div>
        <a href="/" class="btn-leave">Leave Room</a>
    </header>

    <main class="main-workspace">
        <section class="video-section">
            <div id="video-grid"></div>
            
            <div class="controls-bar">
                <button id="mute-btn" class="control-btn" title="Toggle Microphone">
                    <svg class="icon-on" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                    <svg class="icon-off" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="1" y1="1" x2="23" y2="23"></line><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"></path><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                </button>

                <button id="camera-btn" class="control-btn" title="Toggle Camera">
                    <svg class="icon-on" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
                    <svg class="icon-off" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 16v1a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h2m5.66 0H14a2 2 0 0 1 2 2v3.34l1 1L23 7v10"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                </button>

                <button id="copy-btn" class="control-btn btn-invite">
                    <svg id="invite-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                    <span id="invite-text">Copy Invite Link</span>
                </button>
            </div>
        </section>

        <aside class="chat-section">
            <div class="chat-header">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                Live Discussion
            </div>
            <div id="chat-window"></div>
            <form id="chat-form">
                <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off">
                <button type="submit" class="btn-send">Send</button>
            </form>
        </aside>
    </main>

    <script>
        const pathParts = window.location.pathname.split('/');
        const roomId = pathParts[pathParts.length - 1];
        document.getElementById('display-room-id').innerText = roomId;
    </script>
</body>
</html>
