<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Room | StudySpace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-color: #0f111a; --card-bg: #1e2130; --text-main: #f8fafc; --text-muted: #94a3b8; --primary: #6366f1; --accent: #10b981; --danger: #ef4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; }
        
        #activity-warning { background: var(--danger); color: white; text-align: center; padding: 0.5rem; font-weight: 600; display: none; }
        
        .room-header { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 5%; background: rgba(15, 17, 26, 0.9); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .room-title { font-size: 1.5rem; font-weight: 800; display: flex; align-items: center; gap: 10px; }
        .timer-badge { font-family: monospace; font-size: 1.2rem; color: var(--accent); background: rgba(16, 185, 129, 0.1); padding: 0.4rem 1rem; border-radius: 8px; }

        #video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1rem; padding: 2rem 5%; flex-grow: 1; }
        video { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05); }

        .room-controls { display: flex; gap: 1rem; justify-content: center; padding: 2rem; background: var(--card-bg); border-top: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-media { padding: 0.8rem 1.5rem; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 1rem; color: white; display: flex; align-items: center; gap: 8px; }
        .btn-cam { background: var(--primary); }
        .btn-screen { background: var(--accent); }
    </style>
</head>
<body>

    <div id="activity-warning">
        ⏳ You have 2 minutes to turn on your Camera or Share your Screen, or you will be removed for inactivity.
    </div>

    <div class="room-header">
        <div class="room-title">
            <span id="room-id-display">Loading Room...</span>
        </div>
        <div class="timer-badge">
            ⏱ <span id="timer-display">00:00</span>
        </div>
    </div>

    <div id="video-grid"></div>

    <div class="room-controls">
        <button id="btn-start-cam" class="btn-media btn-cam"><i class="fa-solid fa-video"></i> Start Camera</button>
        <button id="btn-share-screen" class="btn-media btn-screen"><i class="fa-solid fa-display"></i> Share Screen</button>
        <button class="btn-media" style="background: var(--danger);" onclick="window.location.href='/'"><i class="fa-solid fa-phone-slash"></i> Leave Room</button>
    </div>

    <script defer src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="/roomLogic.js"></script>
</body>
</html>
