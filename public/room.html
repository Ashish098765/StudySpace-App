<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Study Room | StudySpace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-color: #0f111a; --card-bg: #1e2130; --text-main: #f8fafc; --text-muted: #94a3b8; --primary: #6366f1; --accent: #10b981; --danger: #ef4444; --btn-off: #334155; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { background-color: var(--bg-color); color: var(--text-main); height: 100vh; height: 100dvh; display: flex; overflow: hidden; position: relative; }
        
        /* Main Layout */
        #main-content { flex: 1; display: flex; flex-direction: column; position: relative; transition: all 0.3s ease; width: 100%; }
        
        #activity-warning { background: var(--danger); color: white; text-align: center; padding: 0.8rem; font-weight: 600; font-size: 0.9rem; display: none; z-index: 100; }
        .room-header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; background: rgba(15, 17, 26, 0.8); backdrop-filter: blur(10px); z-index: 10; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .room-title { font-size: 1.2rem; font-weight: 800; }
        .timer-badge { font-family: monospace; font-size: 1.2rem; color: var(--accent); background: rgba(16, 185, 129, 0.1); padding: 0.4rem 1rem; border-radius: 8px; }

        /* Video Grid */
        #video-grid { flex-grow: 1; display: grid; gap: 1rem; padding: 1.5rem; padding-bottom: 120px; align-content: center; justify-content: center; overflow-y: auto; }
        .video-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 3px solid transparent; transition: all 0.2s ease; }
        
        /* SPEAKER HIGHLIGHT */
        .video-container.speaking { border-color: var(--accent); box-shadow: 0 0 25px rgba(16, 185, 129, 0.5); transform: scale(1.02); z-index: 5; }

        .name-badge { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); padding: 6px 14px; border-radius: 50px; font-size: 0.85rem; font-weight: 600; z-index: 2; display: flex; align-items: center; gap: 8px; }
        .badge-avatar { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; border: 1px solid var(--primary); background: var(--card-bg); }

        /* Controls */
        .controls-wrapper { position: fixed; bottom: max(20px, env(safe-area-inset-bottom)); left: 0; width: 100%; display: flex; justify-content: center; pointer-events: none; z-index: 999; }
        .control-bar { background: rgba(30, 33, 48, 0.95); backdrop-filter: blur(15px); padding: 1rem 1.5rem; border-radius: 100px; display: flex; gap: 1rem; pointer-events: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.15); align-items: center; }
        .btn-media { width: 50px; height: 50px; border-radius: 50%; border: none; font-size: 1.2rem; cursor: pointer; transition: all 0.2s ease; display: flex; justify-content: center; align-items: center; color: white; }
        .btn-on { background: var(--primary); }
        .btn-off { background: var(--btn-off); color: #cbd5e1; }
        .btn-danger { background: var(--danger); }

        /* Chat Panel */
        #chat-panel { width: 350px; background: var(--card-bg); border-left: 1px solid rgba(255,255,255,0.05); display: none; flex-direction: column; transition: transform 0.3s ease; z-index: 1000; }
        .chat-header { padding: 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 10px; }
        .message { background: rgba(255,255,255,0.05); padding: 10px 12px; border-radius: 8px; font-size: 0.9rem; }
        .message.mine { background: rgba(99, 102, 241, 0.2); border-bottom-right-radius: 0; align-self: flex-end; }
        .message.theirs { border-bottom-left-radius: 0; align-self: flex-start; }
        .msg-author { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px; font-weight: 600; }
        .chat-input-area { padding: 1rem; border-top: 1px solid rgba(255,255,255,0.05); display: flex; gap: 8px; background: var(--card-bg); }
        #chat-input { flex: 1; padding: 0.8rem; border-radius: 8px; border: none; background: rgba(0,0,0,0.3); color: white; outline: none; }
        #btn-send { background: var(--primary); border: none; color: white; padding: 0 1rem; border-radius: 8px; cursor: pointer; }

        /* --- LOBBY SCREEN --- */
        #lobby-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 2000; display: flex; justify-content: center; align-items: center; padding: 1rem; }
        .lobby-card { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 2rem; width: 100%; max-width: 500px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .lobby-profile { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 1.5rem; }
        .lobby-avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary); }
        .lobby-name { font-size: 1.5rem; font-weight: 800; }
        .lobby-preview-box { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; margin-bottom: 1.5rem; overflow: hidden; position: relative; border: 1px solid rgba(255,255,255,0.1); }
        #btn-join { background: var(--accent); padding: 1rem 2rem; font-weight: 600; font-size: 1.1rem; border-radius: 100px; border: none; color: white; cursor: pointer; width: 100%; margin-top: 1rem; transition: all 0.2s; }
        #btn-join:hover { filter: brightness(1.1); transform: translateY(-2px); }

        @media (max-width: 900px) {
            #chat-panel { position: fixed; top: 0; right: 0; height: 100%; width: 100%; max-width: 400px; box-shadow: -10px 0 30px rgba(0,0,0,0.7); border-left: none; }
            .room-header { padding: 1rem; }
            .control-bar { padding: 0.6rem 1rem; gap: 0.5rem; }
            .btn-media { width: 45px; height: 45px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div id="lobby-screen">
        <div class="lobby-card">
            <div class="lobby-profile">
                <img id="lobby-avatar" class="lobby-avatar" src="https://www.gravatar.com/avatar/?d=mp" alt="Avatar">
                <div id="lobby-name" class="lobby-name">Loading Profile...</div>
                <div style="color: var(--text-muted); font-size: 0.9rem;">Ready to join the study session?</div>
            </div>
            
            <div class="lobby-preview-box" id="lobby-video-preview">
                </div>
            
            <div style="display: flex; gap: 1rem; justify-content: center;">
                <button id="lobby-btn-mic" class="btn-media btn-off"><i class="fa-solid fa-microphone-slash"></i></button>
                <button id="lobby-btn-cam" class="btn-media btn-off"><i class="fa-solid fa-video-slash"></i></button>
            </div>
            
            <button id="btn-join"><i class="fa-solid fa-right-to-bracket"></i> Join Room</button>
        </div>
    </div>

    <div id="main-content">
        <div id="activity-warning">⏳ You have 2 minutes to turn on a device, or you will be removed for inactivity.</div>
        <div class="room-header">
            <div class="room-title" id="room-id-display">Loading...</div>
            <div class="timer-badge">⏱ <span id="timer-display">00:00</span></div>
        </div>
        
        <div id="video-grid">
            <div class="video-container" id="local-player-wrapper" style="display: none;">
                <div id="local-player" style="width: 100%; height: 100%;"></div>
                <div class="name-badge">
                    <img id="local-badge-avatar" class="badge-avatar" src="https://www.gravatar.com/avatar/?d=mp">
                    <span id="local-badge-name">You</span>
                </div>
            </div>
        </div>

        <div class="controls-wrapper">
            <div class="control-bar">
                <button id="main-btn-mic" class="btn-media btn-off"><i class="fa-solid fa-microphone-slash"></i></button>
                <button id="main-btn-cam" class="btn-media btn-off"><i class="fa-solid fa-video-slash"></i></button>
                <button id="btn-chat" class="btn-media btn-off"><i class="fa-solid fa-message"></i></button>
                <div style="width: 2px; height: 30px; background: rgba(255,255,255,0.1); margin: 0 5px;"></div>
                <button class="btn-media btn-danger" onclick="window.location.href='/'"><i class="fa-solid fa-phone-slash"></i></button>
            </div>
        </div>
    </div>

    <div id="chat-panel">
        <div class="chat-header">
            <span><i class="fa-solid fa-comments"></i> Room Chat</span>
            <button id="close-chat" style="background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 5px;"><i class="fa-solid fa-times" style="font-size: 1.2rem;"></i></button>
        </div>
        <div id="chat-messages">
            <div style="text-align: center; color: var(--text-muted); font-size: 0.8rem; margin-top: 1rem;">Welcome to the chat!</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off">
            <button id="btn-send"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <script type="module" src="/roomLogic.js"></script>
</body>
</html>
